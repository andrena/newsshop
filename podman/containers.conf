# Engine-Konfiguration für den verschachtelten (rootless) Betrieb.
[containers]
# slirp4netns stellt Netzwerk ohne root/CAP_NET_ADMIN bereit.
netns = "slirp4netns"

[engine]
# Im Container gibt es i. d. R. kein systemd -> cgroupfs statt systemd-cgroups.
cgroup_manager = "cgroupfs"
# Ohne journald/systemd werden Events in eine Datei geschrieben.
events_logger = "file"
